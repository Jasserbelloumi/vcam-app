name: Build VCam APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Download Xposed API
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/xposed-api.jar \
            "https://github.com/rovo89/XposedBridge/releases/download/art/XposedBridgeApi-54.jar"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=VCam,O=Dev,C=US"

      - name: Build APK
        run: gradle assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: vcam-apk
          path: app/build/outputs/apk/release/*.apk
