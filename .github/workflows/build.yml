name: Build VCam APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          mv gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Download Xposed API
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/xposed-api.jar \
            "https://github.com/rovo89/XposedBridge/releases/download/art/XposedBridgeApi-54.jar"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=VCam,O=Dev,C=US"

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: vcam-apk
          path: app/build/outputs/apk/release/*.apk
